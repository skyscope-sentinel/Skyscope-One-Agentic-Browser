name: macOS Universal DMG

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -C apps/desktop gen:icons
      - run: pnpm -C apps/desktop build
      - run: pnpm -C apps/desktop dist:mac
      - uses: actions/upload-artifact@v4
        with:
          name: mac-universal-dmg
          path: apps/desktop/dist/*.dmg
